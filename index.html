<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refuge Pop | Ton Cinéma Sans Pression</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">🎬 Refuge<span>Pop</span></div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Une envie douce, un frisson, une série ?...">
        </div>
    </header>

    <section class="hero">
        <h1>Installe-toi, on s'occupe du reste.</h1>
        <p>Pas de stress. Pas de choix infini. Juste les bonnes ondes pour ta soirée.</p>
    </section>

    <!-- À insérer à la ligne 23, juste avant <main class="movie-grid" id="movieGrid"> -->
    <div class="filters-container">
        <button class="filter-btn active" data-genre="trending">✨ Tendances</button>
        <button class="filter-btn" data-genre="28">🔥 Action</button>
        <button class="filter-btn" data-genre="35">😂 Comédie</button>
        <button class="filter-btn" data-genre="18">🎭 Drame</button>
        <button class="filter-btn" data-genre="10749">💖 Amour</button>
        <button class="filter-btn" data-genre="16">🧸 Animation</button>
    </div>

    <main class="movie-grid" id="movieGrid">
        </main>

    <!-- La Modale synchronisée avec app.js -->
    <div class="modal-overlay" id="movieModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            
            <!-- ZONE INFO (Recherche id="modalDetails" dans le JS) -->
            <div class="modal-body" id="modalDetails">
                <div class="modal-image">
                    <img id="modalImg" src="" alt="Affiche">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle">Titre</h2>
                    <div class="tags">
                        <span id="modalYear" class="tag">2026</span>
                        <span id="modalGenre" class="tag-accent">Safe Place</span>
                    </div>
                    <p id="modalDesc" class="synopsis">Synopsis ici...</p>
                    <!-- Correction : Ajout de l'id="playBtn" pour éviter le crash JS -->
                    <button class="play-btn" id="playBtn"><i class="fas fa-play"></i> Lancer la soirée</button>
                </div>
            </div>

            <!-- ZONE VIDÉO (Recherche id="videoContainer" et "videoPlayer" dans le JS) -->
            <div class="video-player-container" id="videoContainer" style="display: none; position: relative; width: 100%; padding-top: 56.25%; background: #000;">
                <iframe id="videoPlayer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
